<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Passphrase Generator</title>
<style>
    :root {
        --bg:#f4f6f8; --card:#ffffff; --text:#000; --btn:#0078d4;
    }
    body.dark {
        --bg:#121212; --card:#1e1e1e; --text:#fff; --btn:#2d89ef;
    }
    body {
        background:var(--bg); color:var(--text);
        font-family:Arial, sans-serif;
        display:flex; justify-content:center; align-items:center;
        height:100vh; transition:0.3s;
    }
    .container {
        background:var(--card);
        padding:25px; border-radius:10px;
        width:380px; text-align:center;
        box-shadow:0 6px 15px rgba(0,0,0,.15);
    }
    button {
        margin:6px; padding:10px 14px;
        font-size:14px; border:none; border-radius:6px;
        cursor:pointer; background:var(--btn); color:#fff;
    }
    #output {
        margin-top:14px; padding:10px;
        font-size:18px; font-weight:bold;
        background:rgba(0,0,0,0.05); border-radius:6px;
        word-break:break-word;
    }
    #entropy {
        margin-top:8px; font-size:14px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Passphrase Generator</h2>

    <button onclick="generatePassphrase()">Generate</button>
    <button onclick="copyToClipboard()">Copy</button>
    <button onclick="toggleDarkMode()">Dark Mode</button>

    <div id="output"></div>
    <div id="entropy"></div>
</div>

<script>
const wordList = [
    "anchor","autumn","binary","blossom","canvas","canyon","carbon","cascade",
    "cinder","cipher","crimson","delta","ember","falcon","fathom","galaxy",
    "harbor","helium","horizon","iceberg","inferno","isotope","jupiter",
    "kinetic","lantern","lattice","magnet","meteor","midnight","nebula",
    "obsidian","octane","orbit","pinnacle","quantum","ripple","selenium",
    "signal","solstice","spectrum","summit","tempest","thunder","titan",
    "vector","velocity","vortex","willow","zenith","amber","azure","beam",
    "birch","blaze","brook","cedar","cliff","coral","dawn","drift","dune",
    "echo","fern","fjord","flare","flint","frost","grove","gust","haze",
    "knoll","luna","marble","mist","moss","opal","pine","plume","quartz",
    "ridge","rook","sand","shade","shore","slate","snow","spark","stone",
    "stream","surge","trail","wave","wind","wolf","wood"
];

// Session‑only uniqueness cache
const usedPassphrases = new Set();

function capitalize(w) {
    return w.charAt(0).toUpperCase() + w.slice(1);
}

function calculateEntropy(wordCount) {
    const combinations = Math.pow(wordList.length, wordCount) * 1000;
    return Math.log2(combinations);
}

function entropyLabel(bits) {
    if (bits < 40) return "Weak";
    if (bits < 60) return "Moderate";
    if (bits < 80) return "Strong";
    return "Very Strong";
}

function generatePassphrase() {
    let passphrase, entropyBits, wordCount;

    do {
        wordCount = Math.random() < 0.5 ? 2 : 3;
        let words = [];

        while (words.length < wordCount) {
            const w = wordList[Math.floor(Math.random() * wordList.length)];
            if (!words.includes(w)) words.push(w);
        }

        passphrase = words.map(capitalize).join("");
        passphrase += Math.floor(Math.random() * 1000);

        entropyBits = calculateEntropy(wordCount);

    } while (
        passphrase.length < 12 ||
        passphrase.length > 16 ||
        usedPassphrases.has(passphrase)
    );

    usedPassphrases.add(passphrase);

    document.getElementById("output").textContent = passphrase;
    document.getElementById("entropy").textContent =
        `Entropy: ${entropyBits.toFixed(1)} bits (${entropyLabel(entropyBits)})`;
}

function copyToClipboard() {
    const txt = document.getElementById("output").textContent;
    if (!txt) return;
    navigator.clipboard.writeText(txt);
    alert("Copied!");
}

function toggleDarkMode() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
